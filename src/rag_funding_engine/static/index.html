<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Funding Engine</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Login overlay -->
    <div id="login-overlay" class="login-overlay">
        <form id="login-form" class="login-box">
            <h2>RAG Funding Engine</h2>
            <p class="login-subtitle">Sign in to continue</p>
            <div class="control-group">
                <label for="login-user">Username</label>
                <input type="text" id="login-user" autocomplete="username" required>
            </div>
            <div class="control-group">
                <label for="login-pass">Password</label>
                <input type="password" id="login-pass" autocomplete="current-password" required>
            </div>
            <p id="login-error" class="error-msg" hidden></p>
            <button type="submit">Sign In</button>
        </form>
    </div>

    <div id="app-content" style="display:none">
    <header>
        <div class="header-title">
            <h1>RAG Funding Engine</h1>
            <p class="subtitle">Billing Recommendation Demo</p>
        </div>
        <nav>
            <button class="tab active" data-tab="recommend">Recommend</button>
            <button class="tab" data-tab="schedules">Schedules</button>
            <button class="tab" data-tab="ingest">Ingest</button>
            <button id="logout-btn" class="tab" style="margin-left:auto;color:#fca5a5">Sign Out</button>
        </nav>
    </header>

    <main>
        <!-- Recommend Tab -->
        <section id="recommend" class="tab-content active">
            <div class="recommend-layout">
                <!-- Input Panel -->
                <div class="panel">
                    <p class="panel-label">Input</p>
                    <h2 class="panel-title">Transcript / SOAP Note</h2>
                    <textarea id="consult-text" rows="16" placeholder="Paste transcript or structured SOAP note here..."></textarea>
                    <div class="input-controls">
                        <div class="controls-row">
                            <div class="control-group">
                                <label for="schedule-select">Schedule</label>
                                <select id="schedule-select">
                                    <option value="">Loading...</option>
                                </select>
                            </div>
                            <div class="control-group">
                                <label for="gst-mode">GST</label>
                                <select id="gst-mode">
                                    <option value="excl">Excl. GST</option>
                                    <option value="incl">Incl. GST</option>
                                </select>
                            </div>
                            <div class="control-group">
                                <label for="top-n">Top N: <span id="top-n-value">8</span></label>
                                <input type="range" id="top-n" min="1" max="20" value="8">
                            </div>
                        </div>
                        <button type="button" id="recommend-btn">Suggest Billing Codes</button>
                    </div>
                    <p id="recommend-error" class="error-msg" hidden></p>
                </div>

                <!-- Output Panel -->
                <div class="panel">
                    <div class="panel-header-row">
                        <p class="panel-label">Output</p>
                        <span id="result-count" class="result-count">0 suggested code(s)</span>
                    </div>

                    <div class="table-wrap">
                        <table id="results-table">
                            <thead>
                                <tr>
                                    <th>Code</th>
                                    <th>Unit Price (excl GST)</th>
                                    <th>Qty</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody id="results-body">
                                <tr>
                                    <td colspan="4" class="empty-cell">No suggestions yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="grand-total-row">
                        <div id="grand-total" class="grand-total">
                            Grand Total: <span class="grand-total-amount">$0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Schedules Tab -->
        <section id="schedules" class="tab-content">
            <div class="panel" style="max-width:700px">
                <p class="panel-label">Schedules</p>
                <h2 class="panel-title">Ingested Fee Schedules</h2>
                <div id="schedules-list"></div>
            </div>
        </section>

        <!-- Ingest Tab -->
        <section id="ingest" class="tab-content">
            <div class="panel" style="max-width:500px">
                <p class="panel-label">Ingest</p>
                <h2 class="panel-title">Upload Fee Schedule PDF</h2>
                <form id="ingest-form">
                    <div class="control-group">
                        <label for="ingest-schedule-id">Schedule ID</label>
                        <input type="text" id="ingest-schedule-id" placeholder="e.g. acc1520-medical" required>
                    </div>
                    <div class="control-group">
                        <label for="ingest-pdf">PDF File</label>
                        <input type="file" id="ingest-pdf" accept=".pdf" required>
                    </div>
                    <div class="control-group">
                        <label for="ingest-model">LLM Model</label>
                        <input type="text" id="ingest-model" value="gpt-4o">
                    </div>
                    <button type="submit" id="ingest-btn">Ingest Schedule</button>
                </form>
                <div id="ingest-results"></div>
            </div>
        </section>
    </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
